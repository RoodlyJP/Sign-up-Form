<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="graphic-side">
        <div class="side-bar">
            <div class="background">
                <img src="media/background_image.jpg" alt="leaves picture">
                <div class="header">
                    <img src="media/odin-lined.png" alt="ODIN logo">
                    <h1>ODIN</h1>
                </div>
            </div>

        </div>
    </section>
    <section class="form-side">
        <div class="description">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                <br>Sign up <i>now</i> to get started.
                <br><span>You <i>know</i> you want to.</span>
            </p>
        </div>

        <form method="odin.com" action="post">
            <fieldset class="form">
                <legend>Let's do this!</legend>
                <div class="column first">
                    <div class="form-goup">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" name="first_name">
                    </div>
                    <div class="form-goup">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="form-goup">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password">
                    </div>
                </div>
                <div class="column second">
                    <div class="form-goup">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" name="last_name">
                    </div>
                    <div class="form-goup">
                        <label for="phone-number">PHONE NUMBER</label>
                        <input type="number" id="phone-number" name="phone_number">
                    </div>
                    <div class="form-goup">
                        <label for="password-confirm">CONFIRM PASSWORD</label>
                        <input type="password" id="password-confirm" name="password_confirm">
                    </div>
                </div>
            </fieldset>
            <hr>
            <div>
                <button type="submit">Create Account</button>
            </div>
            <p>Already have an account? <span>Log in</span></p>
        </form>
    </section>
</body>
</html>
